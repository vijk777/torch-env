name: torch-env
channels:
  - conda-forge

# Conda installs only python + pip + a consistent BLAS stack.
# Everything else (including torch) comes from pip so we get fresh wheels.
# macOS arm64 build; torch wheels include MPS support by default.
dependencies:
  - python=3.13
  - pip

  - "libblas=*=*openblas*"

  - pip:
      - h5py
      - imageio
      - ipykernel
      - ipython
      - joblib
      - jupyter
      - matplotlib
      - numpy
      - opencv-python
      - pandas
      - Pillow
      - polars
      - pre-commit
      - pydantic
      - pysr
      - pytest
      - pyyaml
      - ruff
      - scikit-image
      - scikit-learn
      - scipy
      - seaborn
      - tensorstore
      - tifffile
      - torch
      - torch-geometric
      - torchdiffeq
      - torchvision
      - tqdm
      - tyro
      - umap-learn
      - xarray
      - zarr
