name: torch-env
channels:
  - conda-forge

# Conda installs only python + pip + a consistent BLAS/OpenMP stack.
# Everything else (including torch) comes from pip so we get fresh wheels.
# Linux x86_64 build with CUDA 13 torch wheels.
dependencies:
  - python=3.13
  - pip

  # Single OpenMP runtime, OpenBLAS for numpy/scipy
  - "libblas=*=*openblas*"
  - "liblapack=*=*openblas*"
  - llvm-openmp

  - pip:
      # PyTorch CUDA 13 wheels (covers torch, torchvision)
      - --extra-index-url https://download.pytorch.org/whl/cu130

      - h5py
      - imageio
      - ipykernel
      - ipython
      - joblib
      - jupyter
      - matplotlib
      - numpy
      - opencv-python
      - pandas
      - Pillow
      - polars
      - pre-commit
      - pydantic
      - pysr
      - pytest
      - pyyaml
      - ruff
      - scikit-image
      - scikit-learn
      - scipy
      - seaborn
      - tensorstore
      - tifffile
      - torch
      - torch-geometric
      - torchdiffeq
      - torchvision
      - tqdm
      - tyro
      - umap-learn
      - xarray
      - zarr
